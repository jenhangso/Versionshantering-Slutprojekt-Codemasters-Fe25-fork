<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codemasters Messageboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="./js/username.js"></script>
</head>
<body>
<header>
  <nav>
            <div class="link-container" id="nav-links">
                <a href="index.html">Home</a>
                <a href="About.html">About</a>
                <a href="Contact.html">Contact</a>

            </div>
   </nav>
</header>
    <h1>Codemasters Messageboard</h1>

    <button id="themeToggle">Tema</button>
    
<main>
    <form id="messageForm">
      <input type="text" id="name" placeholder="Ditt namn">
      <br><br>
      <textarea id="message" placeholder="Skriv ditt meddelande"></textarea>
      <br><br>
      <button type="submit">Skicka</button>
    </form>

    <p id="statusMessage"></p>

    <h2>Meddelanden</h2>
    <div id="messagesContainer"></div>
  </main>

   <footer>
            <div class="socialbox">
                <p>Socail Media</p>
                <a href="https://www.facebook.com">
                    <img class="socials-icon" src="../img/facebook.png" alt="Facebook Icon">

                </a>
                <a href="https://instagram.com">
                    <img  class="socials-icon"  src="../img/instagram.png" alt="Instagram Icon">
                </a>
                <a href="https://github.com">
                    <img class="socials-icon" src="../img/github.png" alt="Github Icon ">

                </a>
            </div>
            <p>Copyrights 2026, Codemasters</p>
        </footer>
    

  <script type="module" src="js/app.js"></script>
</body>
</html>
